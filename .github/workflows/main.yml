name: Build ZIGZAG_FIBO APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Java (pre-built binary, no PPA) ──────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Python ───────────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── System dependencies ───────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git zip unzip wget autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential ccache lld

      # ── Cache buildozer global dir and Gradle ─────────────────────────────
      - name: Cache buildozer & gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-py310-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-py310-

      # ── Pre-install Android SDK at the path buildozer expects ─────────────
      # Newer SDK ships sdkmanager at cmdline-tools/latest/bin/, NOT tools/bin/.
      # Buildozer still looks for tools/bin/sdkmanager, so we download the
      # cmdline-tools, install required packages, and add the symlink.
      - name: Setup Android SDK
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/cmdline-tools"

          # Download latest command-line tools
          wget -q \
            https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
            -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools
          mv /tmp/cmdtools/cmdline-tools "$SDK_DIR/cmdline-tools/latest"

          SDKMANAGER="$SDK_DIR/cmdline-tools/latest/bin/sdkmanager"

          # Accept all licenses
          yes | "$SDKMANAGER" --sdk_root="$SDK_DIR" --licenses 2>/dev/null || true

          # Install packages buildozer needs
          "$SDKMANAGER" --sdk_root="$SDK_DIR" \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-33" \
            "ndk;25.1.8937393"

          # Create the legacy symlink buildozer looks for
          mkdir -p "$SDK_DIR/tools/bin"
          ln -sf "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" "$SDK_DIR/tools/bin/sdkmanager"
          ln -sf "$SDK_DIR/cmdline-tools/latest/bin/avdmanager" "$SDK_DIR/tools/bin/avdmanager"

          echo "Android SDK setup complete"
          ls "$SDK_DIR/tools/bin/"

      # ── Install buildozer ─────────────────────────────────────────────────
      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # ── Build APK ─────────────────────────────────────────────────────────
      - name: Build APK
        run: buildozer android debug
        env:
          ANDROID_SDK_ROOT: ${{ env.HOME }}/.buildozer/android/platform/android-sdk
          ANDROID_NDK_HOME: ${{ env.HOME }}/.buildozer/android/platform/android-sdk/ndk/25.1.8937393

      # ── Upload APK ────────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZIGZAG_FIBO-APK
          path: bin/*.apk
          retention-days: 30
